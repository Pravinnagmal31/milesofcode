<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Formatter & Validator</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
        textarea { width: 100%; height: 200px; font-family: monospace; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        .controls { margin: 15px 0; }
        button { padding: 10px 20px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
        button:hover { background: #0056b3; }
        #output { white-space: pre; background: #fff; padding: 15px; border: 1px solid #ddd; border-radius: 4px; min-height: 50px; overflow-x: auto; }
        .error { color: #d9534f; background: #fdf7f7; border: 1px solid #d9534f !important; }
        .success { color: #28a745; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h2>JSON Formatter & Issue Tracker</h2>
    <p>Paste your JSON below to format it or find syntax errors.</p>

    <textarea id="jsonInput" placeholder='{"name": "Gemini", "status": "active"}'></textarea>

    <div class="controls">
        <button onclick="processJSON()">Format & Validate</button>
        <button onclick="copyFormattedJSON()">Copy</button>
        <button onclick="downloadFormattedJSON()">Download</button>
    </div>

    <div id="status"></div>
    <div id="output">Formatted JSON will appear here...</div>

    <script>
        function processJSON() {
            const input = document.getElementById('jsonInput');
            const output = document.getElementById('output');
            const status = document.getElementById('status');
            
            // Reset styles
            input.classList.remove('error');
            status.innerHTML = '';

            try {
                if (!input.value.trim()) throw new Error("Please enter some JSON data.");

                // Parse and then stringify with 4-space indentation
                const parsed = JSON.parse(input.value);
                const formatted = JSON.stringify(parsed, null, 4);
                
                output.textContent = formatted;
                status.innerHTML = '<p class="success">✓ Valid JSON</p>';
                output.style.color = '#333';
            } catch (e) {
                input.classList.add('error');
                output.textContent = '';
                
                // Extracting line information if available
                let errorMessage = e.message;
                status.innerHTML = `<p class="error"><strong>Issue Found:</strong> ${errorMessage}</p>`;
                
                // Log detailed error for debugging
                console.error("JSON Error Details:", e);
            }
        }

        function copyFormattedJSON() {
            const output = document.getElementById('output');
            const text = output.textContent.trim();

            if (!text || text === 'Formatted JSON will appear here...') {
                alert('There is no formatted JSON to copy. Please format valid JSON first.');
                return;
            }

            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text)
                    .then(() => {
                        alert('Formatted JSON copied to clipboard.');
                    })
                    .catch(err => {
                        console.error('Clipboard copy failed:', err);
                        fallbackCopyText(text);
                    });
            } else {
                fallbackCopyText(text);
            }
        }

        function fallbackCopyText(text) {
            const tempTextArea = document.createElement('textarea');
            tempTextArea.value = text;
            document.body.appendChild(tempTextArea);
            tempTextArea.select();
            try {
                document.execCommand('copy');
                alert('Formatted JSON copied to clipboard.');
            } catch (err) {
                console.error('Fallback copy failed:', err);
                alert('Unable to copy JSON automatically. Please select and copy manually.');
            }
            document.body.removeChild(tempTextArea);
        }

        function downloadFormattedJSON() {
            const output = document.getElementById('output');
            const text = output.textContent.trim();

            if (!text || text === 'Formatted JSON will appear here...') {
                alert('There is no formatted JSON to download. Please format valid JSON first.');
                return;
            }

            const blob = new Blob([text + '\n'], { type: 'application/json;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'formatted.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
