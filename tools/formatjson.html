<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Advanced JSON Formatter</title>

<style>

body{
background:#1e1e1e;
color:white;
font-family:Arial;
padding:20px;
}

.container{
display:flex;
gap:20px;
margin-top:20px;
}

.panel{
width:50%;
display:flex;
flex-direction:column;
}

.editor{
height:500px;
border:1px solid #333;
}

.controls{
margin-top:12px;
}

button{
background:#0e639c;
border:none;
padding:10px 18px;
border-radius:4px;
color:white;
cursor:pointer;
margin-right:10px;
}

button:hover{
background:#1177bb;
}

#status{
margin-top:10px;
font-weight:bold;
}

.success{
color:#4ec9b0;
}

.error{
color:#f48771;
}

</style>
</head>

<body>

<h2>JSON Formatter & Validator</h2>

<div class="container">

<div class="panel">

<h3>Input JSON</h3>

<div id="editor" class="editor"></div>

<div class="controls">
<button onclick="formatJSON()">Format</button>
<button onclick="minifyJSON()">Minify</button>
<button onclick="copyJSON()">Copy</button>
<button onclick="downloadJSON()">Download</button>
</div>

<div id="status"></div>

</div>


<div class="panel">

<h3>Formatted Output</h3>

<div id="outputEditor" class="editor"></div>

</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>

<script>

let editor
let outputEditor

/* Fix for Monaco workers when using CDN */

window.MonacoEnvironment = {
getWorkerUrl: function () {
return `data:text/javascript;charset=utf-8,${encodeURIComponent(`
self.MonacoEnvironment = { baseUrl: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/' };
importScripts('https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/base/worker/workerMain.js');
`)}`;
}
};

require.config({
paths:{
'vs':'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs'
}
})

require(['vs/editor/editor.main'],function(){

editor=monaco.editor.create(document.getElementById('editor'),{

value:`{
  "city":"pune"
}`,

language:'json',
theme:'vs-dark',
automaticLayout:true,
formatOnType:true,
formatOnPaste:true,
minimap:{enabled:false}

})

outputEditor=monaco.editor.create(document.getElementById('outputEditor'),{

value:'',
language:'json',
theme:'vs-dark',
readOnly:true,
automaticLayout:true,
minimap:{enabled:false}

})

})


function showError(message){

const status=document.getElementById("status")
status.innerHTML='<span class="error">'+message+'</span>'

}


function showSuccess(){

const status=document.getElementById("status")
status.innerHTML='<span class="success">✓ Valid JSON</span>'

}


function formatJSON(){

const text=editor.getValue()

try{

const obj=JSON.parse(text)

const formatted=JSON.stringify(obj,null,4)

outputEditor.setValue(formatted)

showSuccess()

}
catch(e){

showError(e.message)

}

}


function minifyJSON(){

const text=editor.getValue()

try{

const obj=JSON.parse(text)

const minified=JSON.stringify(obj)

outputEditor.setValue(minified)

showSuccess()

}
catch(e){

showError(e.message)

}

}


function copyJSON(){

const text=outputEditor.getValue()

if(!text){
showError("Nothing to copy")
return
}

navigator.clipboard.writeText(text)

document.getElementById("status").innerHTML='<span class="success">Copied</span>'

}


function downloadJSON(){

const text=outputEditor.getValue()

if(!text){
showError("Nothing to download")
return
}

const blob=new Blob([text],{type:"application/json"})

const url=URL.createObjectURL(blob)

const a=document.createElement("a")

a.href=url
a.download="formatted.json"

document.body.appendChild(a)
a.click()

document.body.removeChild(a)

URL.revokeObjectURL(url)

}

</script>

</body>
</html>
