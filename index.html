
<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Advanced JSON Formatter</title>

<style>

body{
background:#1e1e1e;
color:white;
font-family:Arial;
padding:20px;
}

/* PROFILE ICON */

.profileIcon{
position:fixed;
top:20px;
right:20px;
width:40px;
height:40px;
background:#2d2d2d;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
cursor:pointer;
box-shadow:0 0 6px rgba(0,0,0,0.5);
}

.profileIcon:hover{
background:#3c3c3c;
}

/* LAYOUT */

.container{
display:flex;
gap:20px;
margin-top:20px;
align-items:stretch;
}

.panel{
flex:1;
display:flex;
flex-direction:column;
}

.editor{
height:500px;
border:1px solid #333;
}

/* BUTTON COLUMN */

.middleControls{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:12px;
padding-top:40px;
}

.middleControls button{
background:#0e639c;
border:none;
padding:10px 18px;
border-radius:4px;
color:white;
cursor:pointer;
width:140px;
}

.middleControls button:hover{
background:#1177bb;
}

/* TOAST */

#toast{
visibility:hidden;
min-width:200px;
background:#323232;
color:#fff;
text-align:center;
border-radius:6px;
padding:14px;
position:fixed;
z-index:999;
left:50%;
top:20px;
transform:translateX(-50%);
font-size:16px;
}

#toast.show{
visibility:visible;
animation:fadein 0.3s, fadeout 0.3s 2.7s;
}

@keyframes fadein{
from{top:0;opacity:0;}
to{top:20px;opacity:1;}
}

@keyframes fadeout{
from{opacity:1;}
to{opacity:0;}
}

</style>

</head>

<body>

<h2>JSON Formatter & Validator</h2>

<!-- PROFILE ICON -->

<div class="profileIcon" onclick="openProfile()">👤</div>

<div class="container">

<!-- INPUT JSON -->

<div class="panel">

<h3>Input JSON</h3>

<div id="editor" class="editor"></div>

</div>


<!-- BUTTONS -->

<div class="middleControls">

<button onclick="formatJSON()">Format</button>

<button onclick="minifyJSON()">Minify</button>

<button onclick="copyJSON()">Copy</button>

<button onclick="downloadJSON()">Download</button>

</div>


<!-- OUTPUT JSON -->

<div class="panel">

<h3>Formatted Output</h3>

<div id="outputEditor" class="editor"></div>

</div>

</div>

<!-- TOAST -->

<div id="toast">Copied</div>


<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>

<script>

let editor
let outputEditor

/* Monaco worker fix */

window.MonacoEnvironment={
getWorkerUrl:function(){
return `data:text/javascript;charset=utf-8,${encodeURIComponent(`
self.MonacoEnvironment={baseUrl:'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/'};
importScripts('https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/base/worker/workerMain.js');
`)}`;
}
};

require.config({
paths:{
'vs':'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs'
}
})

require(['vs/editor/editor.main'],function(){

editor=monaco.editor.create(document.getElementById('editor'),{

value:`{
  "city":"pune"
}`,

language:'json',
theme:'vs-dark',
automaticLayout:true,
formatOnType:true,
formatOnPaste:true,
minimap:{enabled:false}

})

outputEditor=monaco.editor.create(document.getElementById('outputEditor'),{

value:'',
language:'json',
theme:'vs-dark',
readOnly:true,
automaticLayout:true,
minimap:{enabled:false}

})

})


/* ERROR DISPLAY */

function showError(message){

outputEditor.setValue(
"❌ Invalid JSON\n\nError:\n"+message
)

}


/* FORMAT */

function formatJSON(){

const text=editor.getValue()

try{

const obj=JSON.parse(text)

const formatted=JSON.stringify(obj,null,4)

outputEditor.setValue(formatted)

}
catch(e){

showError(e.message)

}

}


/* MINIFY */

function minifyJSON(){

const text=editor.getValue()

try{

const obj=JSON.parse(text)

const minified=JSON.stringify(obj)

outputEditor.setValue(minified)

}
catch(e){

showError(e.message)

}

}


/* TOAST */

function showToast(message){

const toast=document.getElementById("toast")

toast.innerText=message
toast.className="show"

setTimeout(()=>{
toast.className=toast.className.replace("show","")
},3000)

}


/* COPY */

function copyJSON(){

const text=outputEditor.getValue()

if(!text){
outputEditor.setValue("Nothing to copy")
return
}

navigator.clipboard.writeText(text)

showToast("Copied to clipboard")

}


/* DOWNLOAD */

function downloadJSON(){

const text=outputEditor.getValue()

if(!text){
outputEditor.setValue("Nothing to download")
return
}

const blob=new Blob([text],{type:"application/json"})

const url=URL.createObjectURL(blob)

const a=document.createElement("a")

a.href=url
a.download="formatted.json"

document.body.appendChild(a)
a.click()

document.body.removeChild(a)

URL.revokeObjectURL(url)

}


/* PROFILE PAGE */

function openProfile(){

window.location.href="profile/pravin.html"

}

</script>

</body>

</html>
